[build]
command = "npm run build --workspace client"
publish = "client/dist"
functions = "netlify/functions"

[functions]
node_bundler = "esbuild"
external_node_modules = [
  "@netlify/blobs",
  "bcryptjs",
  "cors",
  "express",
  "express-mongo-sanitize",
  "express-rate-limit",
  "express-validator",
  "google-auth-library",
  "helmet",
  "jsonwebtoken",
  "mongoose",
  "morgan",
  "multer",
  "serverless-http",
  "tesseract.js"
]

[[redirects]]
from = "/api/*"
to = "/.netlify/functions/api/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
