<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SnapSense Workspace</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI Variable", "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #f8fafc, #e2e8f0);
        color: #122033;
      }

      main {
        max-width: 720px;
        padding: 28px;
        border-radius: 24px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 20px 48px rgba(18, 32, 51, 0.12);
      }

      h1 {
        margin-top: 0;
      }

      code {
        padding: 2px 6px;
        border-radius: 8px;
        background: #e9eef4;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SnapSense Source Workspace</h1>
      <p>
        The runnable React app lives in <code>client</code> and the Express API lives in
        <code>server</code>.
      </p>
      <p>
        Start both with <code>npm install</code> followed by <code>npm run dev</code> from the repo
        root.
      </p>
      <p>See <code>README.md</code> for setup details and sample API responses.</p>
    </main>
  </body>
</html>
